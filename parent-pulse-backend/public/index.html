<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParentPulse Chatbot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>ParentPulse Chatbot</h1>
            <div class="header-controls">
                <div class="user-info">
                    <label for="studentId">Student ID:</label>
                    <input type="number" id="studentId" placeholder="Enter student ID" value="1">
                </div>
                <button id="dark-mode-toggle" aria-label="Toggle dark mode">🌙 Dark</button>
            </div>
        </header>

        <div class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <div class="message bot-message">
                    <div class="message-content">
                        Hello! I'm your ParentPulse assistant. How can I help you today?
                    </div>
                </div>
            </div>

            <div class="input-container">
                <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
                <button id="send-button">Send</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
